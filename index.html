<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Votación PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f1226;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.caja{
background:#1c1f3a;
padding:20px;
border-radius:15px;
width:350px;
text-align:center;
}

input,button{
padding:10px;
margin:5px;
width:90%;
border:none;
border-radius:8px;
}

button{
cursor:pointer;
}

.si{background:#ff4d4d;color:white;}
.no{background:#43b581;color:white;}

#panel{display:none;}

video{
width:100%;
margin-top:10px;
border-radius:10px;
display:none;
}

.stats{
margin-top:10px;
font-size:14px;
opacity:0.8;
}
</style>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

</head>

<body>

<div class="caja">

<h2>🗳️ Sistema PRO</h2>

<input id="nombre" placeholder="Tu nombre">

<button onclick="entrar()">Entrar</button>

<div id="panel">

<h3>Hola <span id="user"></span></h3>

<button class="si" onclick="votar('si')">💀 Sí</button>
<button class="no" onclick="votar('no')">🎉 No</button>

<div class="stats">
✔ Sí: <span id="siCount">0</span> |
❌ No: <span id="noCount">0</span>
</div>

<h3 id="msg"></h3>

<video id="video" controls></video>

</div>

</div>

<script>

// 🔥 TU CONFIG DE FIREBASE (PEGA EL TUYO AQUÍ)
const firebaseConfig = {
apiKey: "AIzaSyA2SgyB_hF3rSGIpVMiNdKk_P-1E6xxGyM",
authDomain: "votacion-server.firebaseapp.com",
databaseURL: "https://votacion-server-default-rtdb.firebaseio.com",
projectId: "votacion-server",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = "";
let yaVoto = false;

function entrar(){
user = document.getElementById("nombre").value;

if(!user){
alert("Escribe tu nombre");
return;
}

document.getElementById("user").innerText = user;
document.getElementById("panel").style.display="block";
}

function votar(tipo){

if(yaVoto){
alert("Ya votaste");
return;
}

yaVoto = true;

db.ref("votos/"+tipo).transaction(n => (n||0)+1);

document.getElementById("msg").innerText = tipo=="si" ? "😢 Votaste SÍ" : "🎉 Votaste NO";

let video = document.getElementById("video");
video.style.display="block";

video.src = tipo=="si"
? "si.mp4"
: "no.mp4";
}

// 🔄 contador en vivo
db.ref("votos").on("value", snap=>{
let data = snap.val() || {};
document.getElementById("siCount").innerText = data.si || 0;
document.getElementById("noCount").innerText = data.no || 0;
});

</script>

</body>
</html>
