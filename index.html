<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Votación</title>

<style>
body{
font-family:Arial;
background:#0f1226;
color:white;
text-align:center;
padding:40px;
}

.caja{
max-width:500px;
margin:auto;
background:#1c1f3a;
padding:20px;
border-radius:15px;
}

button{
padding:10px 20px;
margin:10px;
cursor:pointer;
border:none;
border-radius:10px;
}

#panel{ display:none; }

.si{background:#ff4d4d;color:white;}
.no{background:#43b581;color:white;}

video{
width:100%;
margin-top:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="caja">

<h1>🗳️ Sistema de Votación</h1>

<input id="nombre" placeholder="Escribe tu nombre">

<br><br>

<button onclick="entrar()">Entrar</button>

<div id="panel">

<h2>Hola <span id="user"></span></h2>

<button class="si" onclick="votarSi()">💀 Sí</button>
<button class="no" onclick="votarNo()">🎉 No</button>

<h3 id="msg"></h3>

<video id="video" controls style="display:none;"></video>

</div>

</div>

<script>

function entrar(){
const nombre = document.getElementById("nombre").value;

if(!nombre){
alert("Escribe tu nombre primero");
return;
}

document.getElementById("user").innerText = nombre;
document.getElementById("panel").style.display = "block";
}

function votarSi(){
document.getElementById("msg").innerText="😢 Votaste SÍ";
document.getElementById("video").style.display="block";
document.getElementById("video").src="ssstik.io_@pibbledipple_1778120515212.mp3";
}

function votarNo(){
document.getElementById("msg").innerText="🎉 Votaste NO";
document.getElementById("video").style.display="block";
document.getElementById("video").src="ssstik.io_1781154574487.mp4";
}

</script>

</body>
</html>
