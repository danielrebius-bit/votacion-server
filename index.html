<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Votación</title>

<style>
body{
background:#0f1226;
color:white;
font-family:Arial;
text-align:center;
padding:50px;
}

.caja{
max-width:500px;
margin:auto;
background:#1c1f3a;
padding:20px;
border-radius:15px;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

#panel{display:none;}

.si{background:#ff4d4d;color:white;}
.no{background:#43b581;color:white;}

video{
width:100%;
margin-top:20px;
border-radius:10px;
display:none;
}
</style>
</head>

<body>

<div class="caja">

<h1>🗳️ Votación del servidor</h1>

<p>Escribe tu nombre:</p>
<input id="nombre" placeholder="Nombre">

<br><br>

<button onclick="entrar()">Entrar</button>

<div id="panel">

<h2>Hola <span id="user"></span></h2>

<button class="si" onclick="votarSi()">💀 Sí</button>
<button class="no" onclick="votarNo()">🎉 No</button>

<h2 id="msg"></h2>

<video id="video" controls></video>

</div>

</div>

<script>

function entrar(){
let nombre = document.getElementById("nombre").value;

if(!nombre){
alert("Escribe tu nombre");
return;
}

document.getElementById("user").innerText = nombre;
document.getElementById("panel").style.display="block";
}

function votarSi(){
document.getElementById("msg").innerText="😢 Votaste SÍ";
let video = document.getElementById("video");
video.style.display="block";
video.src="ssstik.io_@pibbledipple_1778120515212.mp4";
}

function votarNo(){
document.getElementById("msg").innerText="🎉 Votaste NO";
let video = document.getElementById("video");
video.style.display="block";
video.src="ssstik.io_1781154574487.mp4";
}

</script>

</body>
</html>
